<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti Lodge Competition</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#fff8e8;
}

.header{
    text-align:center;
    padding:30px;
}

.logo{
    width:120px;
}

h1{
    color:#002b5c;
    font-size:45px;
    margin:10px;
}

h2{
    color:#ffb400;
    margin-top:0;
}

.form-box{
    max-width:450px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:2px solid #ddd;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#002b5c;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00418a;
}
</style>
</head>

<body>

<div class="header">
    <h1>ANTI LODGE</h1>
    <h2>Sahi Jawaab Do, Inaam Pao!</h2>
</div>

<div class="form-box">
    <h3>Participant Registration</h3>

    <input type="text" id="name" placeholder="Enter Name">

    <input type="email" id="email" placeholder="Enter Email">

    <button onclick="sendData()">
        Send To Authoriser
    </button>
</div>

<script>
function sendData(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(name=="" || email==""){
        alert("Please fill all fields");
        return;
    }

    alert(
        "Name: " + name +
        "\\nEmail: " + email +
        "\\n\\nBackend se authoriser ko bhejna hoga."
    );
}
</script>

</body>
</html>

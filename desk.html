<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anti Lodge Competition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#fff7e6,#fef3c7);
min-height:100vh;
overflow-x:hidden;
}

.hero{
text-align:center;
padding:30px 15px;
}

.hero h1{
font-size:3rem;
color:#062e63;
font-weight:800;
}

.hero h2{
font-size:2rem;
color:#ffb300;
margin-top:10px;
}

.sun{
font-size:60px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.7);
backdrop-filter:blur(15px);
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.progress{
height:18px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-fill{
width:30%;
height:100%;
background:linear-gradient(90deg,#ffb300,#ff6a00);
}

.timer{
font-size:1.2rem;
font-weight:700;
color:#ff3d00;
margin-bottom:20px;
}

.question{
font-size:1.4rem;
font-weight:700;
color:#062e63;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
padding:15px;
border:none;
border-radius:15px;
resize:none;
font-size:16px;
outline:none;
}

.counter{
text-align:right;
margin-top:8px;
font-weight:600;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.prev{
background:#062e63;
color:white;
}

.next{
background:#ffb300;
color:black;
}

.submit{
background:#22c55e;
color:white;
margin-top:15px;
width:100%;
}

.floating{
position:fixed;
font-size:35px;
animation:float 5s infinite;
opacity:.6;
}

.g1{
left:5%;
top:20%;
}

.g2{
right:8%;
top:30%;
}

.g3{
left:10%;
bottom:15%;
}
</style>
</head>
<body>

<div class="floating g1">🎁</div>
<div class="floating g2">✈️</div>
<div class="floating g3">🏖️</div>

<div class="hero">
<div class="sun">😎☀️</div>
<h1>ANTI LODGE</h1>
<h2>SAHI JAWAAB DO • INAAM PAO</h2>
</div>

<div class="container">
<div class="card">

<div class="progress">
<div class="progress-fill"></div>
</div>

<div class="timer">
⏰ Time Remaining: 09:45
</div>

<div class="question">
Question 1 of 10
<br><br>
What is your favourite thing about Summer Vacation?
</div>

<textarea id="answer"
maxlength="500"
placeholder="Write your answer here..."></textarea>

<div class="counter">
<span id="count">0</span>/500
</div>

<div class="buttons">
<button class="prev">Previous</button>
<button class="next">Next</button>
</div>

<button class="submit">
Submit Competition
</button>

</div>
</div>

<script>

const answer =
document.getElementById("answer");

const count =
document.getElementById("count");

answer.addEventListener("input",()=>{

count.innerText =
answer.value.length;

localStorage.setItem(
"draft",
answer.value
);

});

answer.value =
localStorage.getItem("draft") || "";

count.innerText =
answer.value.length;

</script>

</body>
  </html>
